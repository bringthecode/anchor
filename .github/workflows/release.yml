name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: apps/desktop-electron
        run: npm install
      - name: Build
        working-directory: apps/desktop-electron
        run: npm run build
      - name: Package Mac
        working-directory: apps/desktop-electron
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
